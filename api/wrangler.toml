name = "techblog-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ⚠️ Replace the database_id below with your actual D1 database_id
[[d1_databases]]
binding = "DB"
database_name = "techblog-db"
database_id = "YOUR_D1_DATABASE_ID"  # ← run `wrangler d1 create techblog-db` and paste the uuid here

[vars]
# Allowed frontend origins (CORS)
# Supports comma-separated domains; supports * wildcard; no trailing /
ALLOWED_ORIGIN = "https://YOUR_PROJECT.pages.dev"  # ← your frontend domain (supports comma-separated, wildcard *)

# Set ADMIN_TOKEN via `wrangler secret put ADMIN_TOKEN`, do not put it here

[dev]
port = 8787
